<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>涓村簥璺熷彴 Case Support</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>涓村簥璺熷彴</h1>
      <button id="syncBtn" class="ghost-btn" type="button">鍚屾绂荤嚎鏁版嵁</button>
    </header>

    <main>
      <section id="dashboardView" class="view is-active">
        <div class="card welcome-card">
          <h2>浠婃棩宸ヤ綔鍙?/h2>
          <p id="welcomeText">娆㈣繋鍥炴潵锛屽伐绋嬪笀銆?/p>
          <div class="stats-grid">
            <article class="stat">
              <span class="stat-label">浠婃棩浠诲姟</span>
              <strong id="statToday">0</strong>
            </article>
            <article class="stat">
              <span class="stat-label">鏈湀鍦烘</span>
              <strong id="statMonth">0</strong>
            </article>
            <article class="stat">
              <span class="stat-label">寰呭悓姝?/span>
              <strong id="statPending">0</strong>
            </article>
          </div>
        </div>

        <div class="card">
          <div class="card-title-row">
            <h3>鏈€杩?3 鍦烘墜鏈?/h3>
          </div>
          <ul id="recentCaseList" class="case-list"></ul>
        </div>
      </section>

      <section id="caseFormView" class="view">
        <div class="card">
          <div class="card-title-row">
            <h2>鏂板缓璺熷彴璁板綍</h2>
            <button id="backBtn" class="ghost-btn" type="button">杩斿洖</button>
          </div>

          <div class="stepper" aria-label="鍒嗘琛ㄥ崟">
            <div class="step is-active" data-step="1"><span>1</span>鍩虹淇℃伅</div>
            <div class="step" data-step="2"><span>2</span>鏈腑鍙傛暟</div>
            <div class="step" data-step="3"><span>3</span>鑰楁潗浣跨敤</div>
            <div class="step" data-step="4"><span>4</span>鎬荤粨涓庡浘鐗?/div>
          </div>

          <form id="caseForm" novalidate>
            <div class="form-step is-active" data-step="1">
              <label class="field-label" for="hospitalSearch">鍚堜綔鍖婚櫌</label>
              <input id="hospitalSearch" list="hospitalOptions" class="field" placeholder="鎼滅储骞堕€夋嫨鍖婚櫌">
              <datalist id="hospitalOptions"></datalist>

              <label class="field-label" for="doctorName">鎵嬫湳鍖荤敓</label>
              <input id="doctorName" class="field" placeholder="璇疯緭鍏ュ尰鐢熷鍚? required>

              <label class="field-label" for="surgeryType">鎵嬫湳绫诲瀷</label>
              <input id="surgeryType" class="field" placeholder="渚嬪锛氳吂鑵旈暅鑳嗗泭鍒囬櫎鏈?>

              <label class="field-label" for="deviceModel">鍣ㄦ鍨嬪彿</label>
              <select id="deviceModel" class="field" required></select>
            </div>

            <div class="form-step" data-step="2">
              <div id="dynamicParameters"></div>

              <div class="switch-row">
                <span>鏄惁寮傚父</span>
                <label class="switch">
                  <input id="isAbnormal" type="checkbox">
                  <span class="slider"></span>
                </label>
              </div>

              <label class="field-label" for="outcome">鏈腑缁撴灉</label>
              <textarea id="outcome" class="field" rows="3" placeholder="绠€瑕佽褰曟湳涓粨鏋?></textarea>
            </div>

            <div class="form-step" data-step="3">
              <div class="card-inline">
                <div class="card-title-row">
                  <h3>鑰楁潗杩借釜</h3>
                  <button id="addConsumableBtn" type="button" class="mini-btn">娣诲姞鑰楁潗</button>
                </div>
                <div id="consumableList"></div>
              </div>
            </div>

            <div class="form-step" data-step="4">
              <label class="field-label" for="complications">骞跺彂鐥?椋庨櫓璇存槑</label>
              <textarea id="complications" class="field" rows="3" placeholder="鏃犲彲鐣欑┖"></textarea>

              <label class="field-label" for="mediaInput">鍥剧墖/瑙嗛涓婁紶</label>
              <input id="mediaInput" type="file" class="field" accept="image/*,video/*" capture="environment" multiple>
              <div id="mediaPreview" class="media-preview">鏆傛棤鏂囦欢</div>
            </div>

            <div class="form-actions">
              <button id="prevStepBtn" type="button" class="secondary-btn">涓婁竴姝?/button>
              <button id="nextStepBtn" type="button" class="primary-btn">涓嬩竴姝?/button>
              <button id="submitBtn" type="submit" class="primary-btn is-hidden">鎻愪氦璁板綍</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <button id="newCaseFab" class="fab" type="button">鏂板缓璺熷彴璁板綍</button>
    <section id="updateToast" class="update-toast is-hidden" aria-live="polite">
      <p>发现新版本，建议立即更新以避免缓存旧页面。</p>
      <button id="updateNowBtn" class="primary-btn" type="button">立即更新</button>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
